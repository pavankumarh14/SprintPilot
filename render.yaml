services:
  - type: web
    name: sprintpilot
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: GEMINI_API_KEY
        sync: false  # Set this in Render dashboard
    healthCheckPath: /api/health
